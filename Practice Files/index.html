<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="script.js" defer></script>
    <script src="clock.js" defer></script>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="clock.css" />
    <meta charset="UTF-8" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%23000'/%3E%3C/svg%3E"
    />
  </head>

  <body>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Js Practice</title>
    <button id="resolveButton">Call the Promise</button>
    <button id="rejectButton">Reject the Promise</button>

    <ul id="my-list">
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
      <li>Item 4</li>

      <div class="center-dot"></div>
    </div>

</html>
